sonar.projectKey=azar-cafetero_brisca
sonar.organization=azar-cafetero
sonar.projectName=Azar Cafetero - Brisca
sonar.projectVersion=1.0

sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes
sonar.java.libraries=target/dependency/*.jar

sonar.sourceEncoding=UTF-8
sonar.java.source=21

# Reporte de cobertura generado por JaCoCo
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Exclusiones de cobertura (mismo criterio que jacoco en pom.xml)
sonar.coverage.exclusions=\
  **/AzarcafeteroApplication.java,\
  **/dto/**,\
  **/infrastructure/config/**,\
  **/infrastructure/websocket/WebSocketConfig.java,\
  **/infrastructure/websocket/WebSocketEventListener.java,\
  **/*Exception.java,\
  **/model/GameState.java,\
  **/model/BotDifficulty.java,\
  **/model/Suit.java,\
  **/model/Rank.java

# Excluir generated / boilerplate del análisis
sonar.exclusions=\
  **/target/**,\
  **/dto/**