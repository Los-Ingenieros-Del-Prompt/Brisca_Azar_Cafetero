sonar.projectKey=Los-Ingenieros-Del-Prompt_Brisca_Azar_Cafetero
sonar.organization=los-ingenieros-del-prompt
sonar.projectName=Azar Cafetero - Brisca Service
sonar.projectVersion=1.0

sonar.sources=src/main/java
sonar.tests=src/test/java

sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes

sonar.sourceEncoding=UTF-8
sonar.java.source=21

# JaCoCo report — generated by mvn verify before sonar:sonar
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# ══════════════════════════════════════════════════════════════════
# Coverage exclusions — must mirror JaCoCo <excludes> in pom.xml
# (Sonar uses .java paths; JaCoCo uses .class paths — same classes)
#
# Excluded:
#   · Application entry point (no logic)
#   · Spring @Configuration wiring classes (no domain logic)
#   · Port interfaces (no bytecode)
#   · Domain exceptions (trivial constructors)
#   · Pure enums (no logic branches)
#
# NOT excluded (tested classes with real logic):
#   · GameService, GameMapper, BriscaBotDecisionService
#   · BriscaWebSocketController, WebSocketEventListener
#   · WebSocketGameEventPublisher, InMemoryGameRepository
#   · HttpWalletClient, NoOpWalletClient, WalletOperationException
#   · All domain models, services, and DTOs with validation
# ══════════════════════════════════════════════════════════════════
sonar.coverage.exclusions=\
  **/AzarcafeteroApplication.java,\
  **/infrastructure/config/BriscaApplicationConfig.java,\
  **/infrastructure/config/CorsConfig.java,\
  **/infrastructure/websocket/WebSocketConfig.java,\
  **/application/port/input/*.java,\
  **/application/port/output/*.java,\
  **/domain/exception/*.java,\
  **/domain/model/GameState.java,\
  **/domain/model/BotDifficulty.java,\
  **/domain/model/Suit.java,\
  **/domain/model/Rank.java

# Exclude from ALL Sonar analysis (no issues reported either)
sonar.exclusions=\
  **/target/**,\
  **/AzarcafeteroApplication.java,\
  **/infrastructure/config/**,\
  **/infrastructure/websocket/WebSocketConfig.java