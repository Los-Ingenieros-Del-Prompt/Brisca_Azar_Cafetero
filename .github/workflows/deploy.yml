name: Build & Deploy Brisca

on:
  push:
    branches: [main]

jobs:
  code-quality:
    uses: ./.github/workflows/code-quality.yml
    with:
      java-version: '21'
      sonar-project-key: 'Los-Ingenieros-Del-Prompt_Brisca_Azar_Cafetero' 
      sonar-organization: 'los-ingenieros-del-prompt'
      coverage-threshold: 80
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build-and-deploy:
    needs: code-quality   # bloquea el deploy si calidad falla
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login a DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/azar-brisca:latest

      - name: Deploy en EC2 via SSM
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "docker pull ${{ secrets.DOCKERHUB_USERNAME }}/azar-brisca:latest",
              "docker stop azar-brisca || true",
              "docker rm azar-brisca || true",
              "docker run -d --name azar-brisca --restart unless-stopped -p 8089:8089 -e LOBBY_SERVICE_URL=http://azar-alb-774975018.us-east-1.elb.amazonaws.com -e INTERNAL_API_KEY=${{ secrets.INTERNAL_API_KEY }} ${{ secrets.DOCKERHUB_USERNAME }}/azar-brisca:latest"
            ]' \
            --region us-east-1 \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          for i in {1..20}; do
            sleep 10
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --region us-east-1 \
              --query "Status" \
              --output text)
            echo "Estado: $STATUS"
            if [ "$STATUS" = "Success" ]; then
              echo "Deploy exitoso!"
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "Deploy fallido!"
              STDERR_CONTENT=$(aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                --region us-east-1 \
                --query "StandardErrorContent" \
                --output text)
              STDOUT_CONTENT=$(aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                --region us-east-1 \
                --query "StandardOutputContent" \
                --output text)
              echo "SSM StandardErrorContent:"
              echo "$STDERR_CONTENT"
              echo "SSM StandardOutputContent:"
              echo "$STDOUT_CONTENT"
              exit 1
            fi
          done
          echo "Timeout esperando SSM"
          exit 1
