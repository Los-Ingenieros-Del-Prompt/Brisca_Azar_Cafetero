name: Build & Deploy Brisca

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login a DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/azar-brisca:latest

      - name: Deploy en EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/azar-brisca:latest
            docker stop azar-brisca || true
            docker rm azar-brisca || true
            docker run -d \
              --name azar-brisca \
              --network host \
              -e WALLET_SERVICE_URL="${{ secrets.WALLET_SERVICE_URL }}" \
              -e INTERNAL_API_KEY="${{ secrets.INTERNAL_API_KEY }}" \
              --restart unless-stopped \
              ${{ secrets.DOCKERHUB_USERNAME }}/azar-brisca:latest