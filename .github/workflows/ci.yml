name: CI - Pull Request Quality Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [develop]

jobs:
  code-quality:
    uses: ./.github/workflows/code-quality.yml
    with:
      java-version: '21'
      sonar-project-key: 'azar-cafetero_brisca'
      sonar-organization: 'azar-cafetero'
      coverage-threshold: 80
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}